<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Lender - Loan Eligibility Prediction</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>Smart Lender</h1>
    <p>Check your loan eligibility instantly using AI.</p>
    <form action="/predict" method="POST">
      <label>Gender</label>
      <select name="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>

      <label>Married</label>
      <select name="married">
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>

      <label>Dependents</label>
      <input type="number" name="dependents" min="0" max="10">

      <label>Education</label>
      <select name="education">
        <option value="Graduate">Graduate</option>
        <option value="Not Graduate">Not Graduate</option>
      </select>

      <label>Self Employed</label>
      <select name="self_employed">
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>

      <label>Applicant Income</label>
      <input type="number" name="applicant_income" required>

      <label>Coapplicant Income</label>
      <input type="number" name="coapplicant_income">

      <label>Loan Amount</label>
      <input type="number" name="loan_amount" required>

      <label>Loan Amount Term</label>
      <input type="number" name="loan_term">

      <label>Credit History</label>
      <select name="credit_history">
        <option value="1">Good (1)</option>
        <option value="0">Bad (0)</option>
      </select>

      <label>Property Area</label>
      <select name="property_area">
        <option value="Urban">Urban</option>
        <option value="Semiurban">Semiurban</option>
        <option value="Rural">Rural</option>
      </select>

      <button type="submit">Check Eligibility</button>
    </form>
  </div>
</body>
</html>
