<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prediction Result | Smart Lender</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:

linear-gradient(rgba(5,25,55,.80),rgba(5,25,55,.85)),

url("https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?auto=format&fit=crop&w=1800&q=80");

background-size:cover;

background-position:center;

background-attachment:fixed;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:40px;

}

.container{

width:90%;

max-width:850px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(15px);

border-radius:20px;

padding:45px;

box-shadow:0 20px 40px rgba(0,0,0,.35);

border:1px solid rgba(255,255,255,.15);

text-align:center;

color:white;

}

.logo{

font-size:40px;

color:#4FC3F7;

margin-bottom:20px;

}

h1{

font-size:42px;

margin-bottom:10px;

}

.subtitle{

font-size:18px;

color:#ECEFF1;

margin-bottom:35px;

}

.result-card{

padding:35px;

border-radius:20px;

margin-bottom:35px;

transition:0.4s ease;

}

.result-card.approved{

background:rgba(34,197,94,.15);

border:2px solid rgba(34,197,94,.5);

}

.result-card.rejected{

background:rgba(239,68,68,.15);

border:2px solid rgba(239,68,68,.5);

}

.result-card i{

font-size:90px;

margin-bottom:20px;

}

.result-card.approved i{

color:#22C55E;

}

.result-card.rejected i{

color:#EF4444;

}

.result-card.approved h2{

color:#22C55E;

}

.result-card.rejected h2{

color:#EF4444;

}

.info{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:20px;

margin-top:30px;

}

.box{

background:rgba(255,255,255,.08);

padding:20px;

border-radius:15px;

}

.box h3{

color:#4FC3F7;

margin-bottom:10px;

}

.box p{

font-size:18px;

}

.buttons{

display:flex;

gap:20px;

margin-top:40px;

}

.btn{

flex:1;

padding:18px;

text-decoration:none;

border-radius:10px;

font-size:18px;

font-weight:bold;

transition:.3s;

}

.predict{

background:#2563EB;

color:white;

}

.predict:hover{

background:#1D4ED8;

}

.home{

background:#22C55E;

color:white;

}

.home:hover{

background:#16A34A;

}

footer{

margin-top:40px;

font-size:15px;

color:#CFD8DC;

}

@media(max-width:768px){

.info{

grid-template-columns:1fr;

}

.buttons{

flex-direction:column;

}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<i class="fa-solid fa-building-columns"></i>

</div>

<h1>Smart Lender</h1>

<p class="subtitle">

AI Powered Loan Approval Prediction System

</p>


{% if result == "Loan Approved" %}

<div class="result-card approved">

<i class="fa-solid fa-circle-check"></i>

<h2>{{ result }}</h2>

<p>

🎉 Congratulations!


</p>

</div>

{% else %}

<div class="result-card rejected">

<i class="fa-solid fa-circle-xmark"></i>

<h2>{{ result }}</h2>

<p>

Unfortunately, Your Loan Was Not Approved

</p>

</div>

{% endif %}


<!-- ========================================= -->
<!-- ACTION BUTTONS -->
<!-- ========================================= -->

<div class="buttons">

<a href="{{ url_for('predict') }}" class="btn predict">

<i class="fa-solid fa-repeat"></i>

Predict Another Loan

</a>

<a href="{{ url_for('home') }}" class="btn home">

<i class="fa-solid fa-house"></i>

Back To Home

</a>

</div>

</div>

</body>

</html>
